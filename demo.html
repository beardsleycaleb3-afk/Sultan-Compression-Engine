<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sultan-v88 // Mobile Touch Spec</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: #000; color: #00FF41; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; overflow: hidden; height: 100vh; }
        
        /* Responsive Canvas */
        #canvas-wrap { width: 90vw; height: 90vw; max-width: 400px; max-height: 400px; border: 1px solid #00FF41; background: #050505; position: relative; margin-top: 10px; }
        canvas { width: 100%; height: 100%; }

        /* Mobile Controls */
        #ui-layer { width: 100%; padding: 15px; display: flex; flex-direction: column; align-items: center; flex-grow: 1; justify-content: space-around; }
        .btn-row { display: flex; gap: 10px; width: 100%; max-width: 400px; }
        button { flex: 1; padding: 20px; background: #000; color: #00FF41; border: 2px solid #00FF41; font-weight: bold; font-family: inherit; font-size: 16px; border-radius: 8px; }
        button:active { background: #00FF41; color: #000; }
        
        #console { width: 90vw; max-width: 400px; height: 100px; border: 1px solid #008F11; font-size: 10px; padding: 5px; overflow-y: scroll; background: #000; }
        
        .toggle-row { display: flex; align-items: center; gap: 10px; font-size: 12px; margin-top: 10px; }
        input[type="checkbox"] { transform: scale(1.5); }
    </style>
</head>
<body>

    <div id="canvas-wrap">
        <canvas id="sultanCanvas" width="400" height="400"></canvas>
    </div>

    <div id="ui-layer">
        <div id="console">BOOTING SULTAN-v88...</div>

        <div class="btn-row">
            <button id="foldBtn">FOLD (3000:1)</button>
            <button id="unfoldBtn">UNFOLD (018810)</button>
        </div>

        <button id="manifestBtn" style="width: 100%; max-width: 400px;">EXPORT SEAL (8oOOo8)</button>

        <div class="toggle-row">
            <input type="checkbox" id="kbMouseToggle">
            <label for="kbMouseToggle">ENABLE MOUSE/KB INPUT</label>
        </div>
    </div>

<script>
const canvas = document.getElementById('sultanCanvas');
const ctx = canvas.getContext('2d');
const cons = document.getElementById('console');
const toggle = document.getElementById('kbMouseToggle');

let isFolding = false;
let foldScale = 1.0;
const center = 200;
let frame = 0;

const log = (msg) => {
    cons.innerHTML += `> ${msg}<br>`;
    cons.scrollTop = cons.scrollHeight;
};

// Input Gatekeeper
const preventInput = (e) => {
    if (!toggle.checked) {
        if (e.type.startsWith('key') || e.type.startsWith('mouse')) {
            e.preventDefault();
            return false;
        }
    }
};

window.addEventListener('keydown', preventInput, true);
window.addEventListener('mousedown', preventInput, true);

// Sultan Core Logic
document.getElementById('foldBtn').ontouchstart = () => {
    isFolding = true;
    log("FOLDING: Collapsing to Diamond Equilibrium...");
};

document.getElementById('unfoldBtn').ontouchstart = () => {
    isFolding = false;
    log("UNFOLDING: Reconstructing from Mirror Spec...");
};

document.getElementById('manifestBtn').ontouchstart = () => {
    const blob = new Blob([JSON.stringify({seal:"8oOOo8", status:"Verified"}, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'SULTAN_MOBILE_EXPORT.json';
    a.click();
    log("8oOOo8 SEAL DOWNLOADED.");
};

function animate() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillRect(0, 0, 400, 400);

    // Dynamic Folding Math
    if (isFolding && foldScale > 0.05) foldScale -= 0.02;
    if (!isFolding && foldScale < 1.0) foldScale += 0.02;

    const time = Date.now() * 0.002;
    
    ctx.save();
    ctx.translate(center, center);
    ctx.scale(foldScale, foldScale);

    // Crosshair Anchors
    ctx.strokeStyle = 'rgba(0, 255, 65, 0.4)';
    ctx.strokeRect(-180, -1, 360, 2);
    ctx.strokeRect(-1, -180, 2, 360);

    // Diamond Lattice
    ctx.strokeStyle = '#00FF41';
    for(let i=0; i<6; i++) {
        ctx.rotate(time * 0.2 + (i * Math.PI / 3));
        ctx.strokeRect(-50 - (i*20), -50 - (i*20), 100 + (i*40), 100 + (i*40));
    }
    
    ctx.restore();
    
    if (frame % 60 === 0) {
        if(isFolding) log("Symmetry Collapse Active...");
    }

    frame++;
    requestAnimationFrame(animate);
}

log("Touch Interface Ready.");
log("Mouse/KB Locked by default.");
animate();
</script>
</body>
</html>
